apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: projectsveltos
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--diagnostics-address=:8443"
        - "--v=5"
        env:
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
